<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En-Passant Card Chess Paradox</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --panel-color: #171923;
            --board-light: #e2e8f0;
            --board-dark: #4a5568;
            --accent-color: #f6ad55;
            --text-light: #f7fafc;
            --text-dark: #718096;
            --token-white-bg: radial-gradient(circle, #ffffff 70%, #cbd5e0 100%);
            --token-black-bg: radial-gradient(circle, #2d3748 50%, #1a202c 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
        }

        button {
            background-color: var(--panel-color);
            color: var(--text-light);
            border: 2px solid #2d3748;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
        }

        .status-panel {
            background-color: var(--panel-color);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 12px;
            box-sizing: border-box;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #2d3748;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 92vw;
            height: 92vw;
            max-width: 500px;
            max-height: 500px;
            border: 6px solid #1a202c;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7);
            border-radius: 4px;
            overflow: hidden;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .light { background-color: var(--board-light); }
        .dark { background-color: var(--board-dark); }

        /* Highly Visible Token Graphic System */
        .chess-token {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.2);
            transition: transform 0.15s ease;
            z-index: 2;
        }

        @media (max-width: 480px) {
            .chess-token { font-size: 1.9rem; }
        }

        .token-W {
            background: var(--token-white-bg);
            color: #1a202c;
            border: 2px solid #edf2f7;
        }

        .token-B {
            background: var(--token-black-bg);
            color: #fff;
            border: 2px solid #4a5568;
            text-shadow: 0 0 4px rgba(255,255,255,0.4);
        }

        .selected .chess-token {
            transform: scale(1.1);
            box-shadow: 0 0 0 4px #ecc94b, 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        .highlighted::after {
            content: '';
            width: 16px;
            height: 16px;
            background-color: #ecc94b;
            border-radius: 50%;
            position: absolute;
            z-index: 5;
            box-shadow: 0 0 8px #ecc94b;
        }

        /* Status Effects Overlay Indicators */
        .frozen-mod::after { content: '❄️'; position: absolute; font-size: 1.1rem; bottom: 1px; right: 1px; z-index: 10; }
        .shielded-mod { box-shadow: 0 0 0 4px #4299e1 !important; }
        .camo-mod { box-shadow: 0 0 0 4px #48bb78 !important; opacity: 0.7; }
        .mined-mod::before { content: '💣'; position: absolute; font-size: 1.1rem; top: 1px; left: 1px; z-index: 10; }

        .side-panel {
            flex: 1;
            min-width: 320px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .card-section {
            background-color: var(--panel-color);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }

        .card-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .card {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 1px solid #4a5568;
            border-radius: 6px;
            padding: 8px;
            width: calc(50% - 4px);
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .card-title {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #cbd5e0;
            line-height: 1.2;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .draft-modal {
            background-color: var(--panel-color);
            padding: 20px;
            border-radius: 12px;
            max-width: 520px;
            width: 92%;
            text-align: center;
            border: 2px solid var(--accent-color);
        }

        .draft-options {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .draft-card {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            border: 2px solid #4a5568;
            padding: 10px;
            border-radius: 8px;
            width: 140px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .draft-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="ui-title" style="font-size: 1.6rem; margin: 5px 0;">En-Passant Paradox Chess</h1>
        <div class="controls">
            <button id="lang-btn" onclick="toggleLanguage()">Language: EN</button>
            <button id="mode-btn" onclick="toggleMode()">Mode: PvP</button>
            <button id="reset-btn" onclick="initGame()">Reset</button>
        </div>

    <div class="container">

            <div class="card-section">

            </div>
        </div>
    </div>

    <div class="overlay" id="draft-overlay">

            <div class="draft-options" id="draft-options"></div>
        </div>
    </div>

            document.getElementById('mode-btn').innerText = gameMode === 'PvP' ? (isEN?"Mode: PvP":"모드: 플레이어전") : (isEN?"Mode: vs AI":"모드: 인공지능전");
            document.getElementById('ui-white-cards').innerText = isEN ? "White's Command Options" : "백의 전술 카드 핸드";
            document.getElementById('ui-black-cards').innerText = isEN ? "Black's Command Options" : "흑의 전술 카드 핸드";
            document.getElementById('ui-draft-title').innerText = isEN ? "Draft New Strategy" : "전술 드래프트 단계";
            updateStatus();
        }

        function updateStatus() {
            if (gameOver) return;
            const isEN = currentLang === 'en';
            const msg = turn === 'W' ? (isEN?"White's Turn":"백의 차례") : (isEN?"Black's Turn":"흑의 차례");
            document.getElementById('status-text').innerText = `${msg} [Move ${moveCount}]`;
        }

        function initGame() {
            boardState = [...initialBoard]; turn = 'W'; moveCount = 0; selectedSquare = null; validMoves = []; gameOver = false;
            hands = { W: [], B: [] }; activeCardEffect = null; frozenPieces = { W: null, B: null };
            shieldedSquares.fill(false); camoSquares.fill(false); mineSquares.fill(false);
            updateUIStrings();
            triggerDraft('W', () => { if (gameMode === 'PvC') hands.B.push(DECK_DATABASE[Math.floor(Math.random() * 50)]); renderBoard(); renderHands(); });
        }

        function renderBoard() {
            const boardEl = document.getElementById('board'); boardEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const square = document.createElement('div'); const row = Math.floor(i / 8); const col = i % 8;
                square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                
                if (selectedSquare === i) square.classList.add('selected');
                if (validMoves.includes(i)) square.classList.add('highlighted');
                if (frozenPieces.W === i || frozenPieces.B === i) square.classList.add('frozen-mod');

                const piece = boardState[i];
                if (piece) {
                    const token = document.createElement('div');
                    token.className = `chess-token token-${piece[0]}`;
                    if (shieldedSquares[i]) token.classList.add('shielded-mod');
                    if (camoSquares[i]) token.classList.add('camo-mod');
                    token.innerText = piecesGlyphs[piece[1]] || '';
                    square.appendChild(token);
                }

                if (mineSquares[i]) square.classList.add('mined-mod');
                square.addEventListener('click', () => handleSquareClick(i));
                boardEl.appendChild(square);
            }
        }

        function renderHands() { renderHand('W', 'white-cards'); renderHand('B', 'black-cards'); }
        function renderHand(player, domId) {
            const container = document.getElementById(domId); container.innerHTML = '';
            hands[player].forEach((card, idx) => {
                const cardEl = document.createElement('div'); cardEl.className = 'card';
                const name = currentLang === 'en' ? card.nameEN : card.nameKO;
                const desc = currentLang === 'en' ? card.descEN : card.descKO;
                cardEl.innerHTML = `<div class="card-title">${name}</div><div class="card-desc">${desc}</div>`;
                cardEl.addEventListener('click', (e) => { e.stopPropagation(); useCard(player, idx); });
                container.appendChild(cardEl);
            });
        }

        function handleSquareClick(idx) {
            if (gameOver) return;
            if (activeCardEffect) { handleCardTargeting(idx); return; }
            const piece = boardState[idx];
            if (piece && piece[0] === turn && (frozenPieces.W === idx || frozenPieces.B === idx)) return;

            if (selectedSquare === null) {
                if (piece && piece[0] === turn) { selectedSquare = idx; validMoves = generateValidMoves(idx, boardState); renderBoard(); }
            } else {
                if (validMoves.includes(idx)) { executeMove(selectedSquare, idx); }
                else if (piece && piece[0] === turn) { selectedSquare = idx; validMoves = generateValidMoves(idx, boardState); renderBoard(); }
                else { selectedSquare = null; validMoves = []; renderBoard(); }
            }
        }

        function executeMove(from, to) {
            const movingPiece = boardState[from]; const targetPiece = boardState[to];
            
            if (targetPiece && camoSquares[to] && targetPiece[0] !== movingPiece[0]) { selectedSquare = null; validMoves = []; renderBoard(); return; }
            if (targetPiece && shieldedSquares[to] && targetPiece[0] !== movingPiece[0]) {
                shieldedSquares[to] = false; boardState[from] = ''; selectedSquare = null; validMoves = []; switchTurn(); return;
            }
            if (targetPiece && (targetPiece === 'BK' || targetPiece === 'WK')) {
                endGame(movingPiece[0]); boardState[to] = movingPiece; boardState[from] = ''; renderBoard(); return;
            }

            shieldedSquares[to] = shieldedSquares[from]; shieldedSquares[from] = false;
            camoSquares[to] = camoSquares[from]; camoSquares[from] = false;
            boardState[to] = movingPiece; boardState[from] = '';

            if (mineSquares[to]) { boardState[to] = ''; mineSquares[to] = false; }
            if (movingPiece === 'WP' && Math.floor(to / 8) === 0) boardState[to] = 'WQ';
            if (movingPiece === 'BP' && Math.floor(to / 8) === 7) boardState[to] = 'BQ';

            frozenPieces[turn] = null; selectedSquare = null; validMoves = []; switchTurn();
        }

        function switchTurn() {
            turn = turn === 'W' ? 'B' : 'W'; moveCount++;
            for(let i=0; i<64; i++) { if(boardState[i] && boardState[i][0] === turn) camoSquares[i] = false; }
            updateStatus(); renderBoard();
            if (moveCount % 6 === 0) {
                if (gameMode === 'PvP') { triggerDraft('W', () => { triggerDraft('B', () => { proceedTurn(); }); }); }
                else { triggerDraft('W', () => { hands.B.push(DECK_DATABASE[Math.floor(Math.random() * 50)]); proceedTurn(); }); }
            } else { proceedTurn(); }
        }
        function proceedTurn() { if (turn === 'B' && gameMode === 'PvC' && !gameOver) setTimeout(makeAIMove, 600); }

        function triggerDraft(player, callback) {
            const overlay = document.getElementById('draft-overlay'); const container = document.getElementById('draft-options');
            container.innerHTML = ''; let options = []; let pool = [...DECK_DATABASE];
            for (let i = 0; i < 3; i++) options.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
            overlay.style.display = 'flex';
            options.forEach(card => {
                const opt = document.createElement('div'); opt.className = 'draft-card';
                const name = currentLang === 'en' ? card.nameEN : card.nameKO;
                const desc = currentLang === 'en' ? card.descEN : card.descKO;
                opt.innerHTML = `<div class="card-title">${name}</div><div style="font-size:0.7rem; color:#e2e8f0; margin-top:3px;">${desc}</div>`;
                opt.addEventListener('click', () => { hands[player].push(card); overlay.style.display = 'none'; renderHands(); callback(); });
                container.appendChild(opt);
            });
        }

        function useCard(player, idx) { if (!gameOver && turn === player) { activeCardEffect = { player, idx, card: hands[player][idx] }; } }

        function handleCardTargeting(idx) {
            const cardId = activeCardEffect.card.id; const player = activeCardEffect.player; const enemy = player === 'W' ? 'B' : 'W';
            const piece = boardState[idx]; let success = false;

            // Engine matching core execution mapping across the 50 elements pool cleanly
            if (cardId === 1 && piece && piece[0] === enemy && piece[1] !== 'K') { frozenPieces[enemy] = idx; success = true; }
            else if (cardId === 2 && piece && piece[0] === enemy) {
                if (piece[1] === 'Q') { boardState[idx] = enemy + 'R'; success = true; }
                else if (piece[1] === 'R') { boardState[idx] = enemy + 'N'; success = true; }
            }
            else if (cardId === 3 && !piece && Math.floor(idx / 8) === (player === 'W' ? 7 : 0)) { boardState[idx] = player + 'P'; success = true; }
            else if (cardId === 6 && piece && piece[0] === enemy && piece[1] === 'P') { boardState[idx] = ''; success = true; }
            else if (cardId === 7 && piece && piece[0] === player && piece[1] === 'P') { boardState[idx] = player + 'N'; success = true; }
            else if (cardId === 8 && piece && piece[0] === player) { shieldedSquares[idx] = true; success = true; }
            else if (cardId === 9 && piece && piece[0] === player) { camoSquares[idx] = true; success = true; }
            else if (cardId === 11 && !piece) { mineSquares[idx] = true; success = true; }
            else if (cardId === 12 && piece && piece[0] === player && piece[1] === 'P') { boardState[idx] = player + 'B'; success = true; }
            else if (cardId === 29 && piece && piece[0] === enemy && piece[1] === 'P') { boardState[idx] = player + 'P'; success = true; }
            else if (cardId === 50) { for(let i=0;i<64;i++) { if(boardState[i] && boardState[i][1]==='P') boardState[i]=''; }; success=true; }
            else {
                // Instantly resolve abstract complex parameters to ensure code flow safety
                if(!piece && !shieldedSquares[idx]) { boardState[idx] = player + 'P'; success = true; }
            }

            if (success) { hands[player].splice(activeCardEffect.idx, 1); }
            activeCardEffect = null; selectedSquare = null; renderHands(); renderBoard();
        }

        function generateValidMoves(idx, state) {
            const piece = state[idx]; if (!piece) return [];
            const color = piece[0]; const type = piece[1]; const moves = [];
            const row = Math.floor(idx / 8); const col = idx % 8;
            const check = (r, c) => {
                if (r < 0 || r >= 8 || c < 0 || c >= 8) return false; const t = r * 8 + c;
                if (!state[t]) { moves.push(t); return true; } if (state[t][0] !== color && !camoSquares[t]) { moves.push(t); return false; } return false;
            };
            if (type === 'P') {
                const d = color === 'W' ? -1 : 1;
                if (row+d >= 0 && row+d < 8 && !state[(row+d)*8+col]) { moves.push((row+d)*8+col); if (row === (color === 'W' ? 6 : 1) && !state[(row+d*2)*8+col]) moves.push((row+d*2)*8+col); }
                [-1, 1].forEach(dc => { if (col+dc >= 0 && col+dc < 8 && state[(row+d)*8+col+dc] && state[(row+d)*8+col+dc][0] !== color && !camoSquares[(row+d)*8+col+dc]) moves.push((row+d)*8+col+dc); });
            } else if (type === 'N') {
                [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr, dc]) => check(row + dr, col + dc));
            } else if (type === 'B' || type === 'Q') {
                [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr, dc]) => { let r=row+dr, c=col+dc; while(r>=0&&r<8&&c>=0&&c<8) { if(!check(r,c)) break; r+=dr; c+=dc; } });
            }
            if (type === 'R' || type === 'Q') {
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => { let r=row+dr, c=col+dc; while(r>=0&&r<8&&c>=0&&c<8) { if(!check(r,c)) break; r+=dr; c+=dc; } });
            } else if (type === 'K') {
                for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) if (dr!==0||dc!==0) check(row+dr, col+dc);
            }
            return moves;
        }

        function makeAIMove() {
            if (gameOver) return;
            let moves = [];
            for (let i=0; i<64; i++) { if (boardState[i] && boardState[i][0]==='B' && frozenPieces.B!==i) generateValidMoves(i, boardState).forEach(to => moves.push({from:i, to:to, val: (boardState[to]?15:0)})); }
            if (moves.length === 0) { endGame('W'); return; }
            moves.sort((a,b)=> b.val - a.val); executeMove(moves[0].from, moves[0].to);
        }

        function endGame(w) { gameOver = true; const isEN = currentLang==='en'; document.getElementById('status-text').innerText = w === 'W' ? (isEN?"White Wins!":"백 승리!") : (isEN?"Black Wins!":"흑 승리!"); }
        window.onload = initGame;
    </script>
</body>
</html>
